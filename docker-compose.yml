services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach"]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://coach:coach@db:5432/coach
      SECRET_KEY: dev-secret-key-local
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
