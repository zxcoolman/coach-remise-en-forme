services:
  - type: web
    name: coach-remise-en-forme
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coach-db
          property: connectionString

databases:
  - name: coach-db
    plan: free
